services:
  db:
    image: postgres:15-alpine
    container_name: gidas_dev_db
    env_file: !override
      - ./backend/${BACKEND_ENV_FILE:-.env.docker}
    ports: !override
      - "${POSTGRES_PORT:-5433}:5432"

  backend:
    build:
      context: ./backend
      target: development
    env_file: !override
      - ./backend/${BACKEND_ENV_FILE:-.env.docker}
    environment:
      APP_ENV: ${APP_ENV:-docker}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost:5173,http://localhost:8080,http://localhost}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:seminarioGid4s.@db:5432/gidas_db}
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-redis://redis:6379/0}
    ports: !override
      - "${BACKEND_PORT:-5000}:5000"
    volumes: !override
      - ./backend:/app
    read_only: false
    tmpfs: !override []
    cap_drop: !override []
    security_opt: !override []
    pids_limit: 0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      target: development
    depends_on: !override []
    env_file: !override
      - ./frontend/${FRONTEND_ENV_FILE:-.env}
    environment:
      VITE_APP_ENV: ${VITE_APP_ENV:-local}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api/v1}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
      VITE_SERVER_FILTER_PERSONAL: ${VITE_SERVER_FILTER_PERSONAL:-true}
    ports: !override
      - "${FRONTEND_PORT:-5173}:5173"
    expose: !override
      - "5173"
    volumes: !override
      - ./frontend:/app
      - /app/node_modules
    read_only: false
    tmpfs: !override []
    cap_drop: !override []
    security_opt: !override []
    pids_limit: 0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: gidas_dev_proxy
    restart: unless-stopped
    ports: !override
      - "${NGINX_PORT:-8080}:8080"
    volumes: !override
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - gidas_network
volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME:-gidas_dev_postgres_data}

networks:
  gidas_network:
    driver: bridge
    name: ${COMPOSE_NETWORK:-gidas_dev_network}
