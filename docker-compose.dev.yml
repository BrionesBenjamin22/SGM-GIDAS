services:
  db:
    env_file:
      - ./backend/${BACKEND_ENV_FILE:-.env}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"

  backend:
    build:
      context: ./backend
      target: development
    env_file:
      - ./backend/${BACKEND_ENV_FILE:-.env}
    volumes:
      - ./backend:/app
    read_only: false
    tmpfs: []
    cap_drop: []
    security_opt: []
    pids_limit: 0

  frontend:
    build:
      context: ./frontend
      target: development
    env_file:
      - ./frontend/${FRONTEND_ENV_FILE:-.env}
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    read_only: false
    tmpfs: []
    cap_drop: []
    security_opt: []
    pids_limit: 0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
