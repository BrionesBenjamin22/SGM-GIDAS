services:
  db:
    image: postgres:16
    container_name: ${COMPOSE_SERVICE_PREFIX:-gidas}_db
    restart: unless-stopped
    env_file:
      - ./backend/${BACKEND_ENV_FILE:-.env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gidas_network
    shm_size: 128mb
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_SERVICE_PREFIX:-gidas}_redis
    restart: unless-stopped
    user: redis
    command: ["redis-server", "--appendonly", "no", "--save", "", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    networks:
      - gidas_network
    read_only: true
    tmpfs:
      - /data
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    container_name: ${COMPOSE_SERVICE_PREFIX:-gidas}_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/${BACKEND_ENV_FILE:-.env.production}
    expose:
      - "5000"
    networks:
      - gidas_network
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SERVER_FILTER_PERSONAL: ${VITE_SERVER_FILTER_PERSONAL:-true}
    container_name: ${COMPOSE_SERVICE_PREFIX:-gidas}_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - gidas_network
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128

  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: ${COMPOSE_SERVICE_PREFIX:-gidas}_proxy
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - gidas_network
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME:-gidas_prod_postgres_data}
networks:
  gidas_network:
    driver: bridge
    name: ${COMPOSE_NETWORK:-gidas_prod_network}
