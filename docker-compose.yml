services:
  db:
    image: postgres:16
    container_name: gidas_db_v1
    restart: always
    env_file:
      - ./backend/.env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gidas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: gidas_backend_v1
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env.docker
    expose:
      - "5000"
    volumes:
      - ./backend:/app
    networks:
      - gidas_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: gidas_frontend_v1
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./frontend/.env
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - gidas_network

  nginx:
    image: nginx:stable-alpine
    container_name: gidas_proxy_v1
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gidas_network

volumes:
  postgres_data:

networks:
  gidas_network:
    driver: bridge